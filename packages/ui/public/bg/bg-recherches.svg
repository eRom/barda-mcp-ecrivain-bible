<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Recherches: livres ouverts, loupe, parchemins -->
  <g fill="#06B6D4">
    <!-- Livre ouvert posé -->
    <path d="M80,100 l-50,15 l8,60 l55,-18z"/>
    <path d="M80,100 l50,15 l-8,60 l-55,-18z"/>
    <line x1="80" y1="100" x2="80" y2="157" stroke="#06B6D4" stroke-width="2"/>
    <!-- Lignes texte -->
    <line x1="42" y1="125" x2="70" y2="118" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>
    <line x1="43" y1="135" x2="72" y2="128" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>
    <line x1="44" y1="145" x2="68" y2="139" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>
    <line x1="90" y1="118" x2="118" y2="125" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>
    <line x1="89" y1="128" x2="120" y2="135" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>
    <line x1="88" y1="139" x2="112" y2="144" stroke="#06B6D4" stroke-width="1.2" opacity="0.4"/>

    <!-- Loupe (élément central) -->
    <circle cx="210" cy="95" r="30" fill="none" stroke="#06B6D4" stroke-width="4"/>
    <circle cx="210" cy="95" r="24" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.3"/>
    <line x1="232" y1="117" x2="255" y2="145" stroke="#06B6D4" stroke-width="5" stroke-linecap="round"/>
    <line x1="232" y1="117" x2="255" y2="145" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <!-- Reflet loupe -->
    <path d="M195,78 q5,-5 12,-3" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.4"/>
    <!-- Contenu loupe (symboles de recherche) -->
    <circle cx="205" cy="90" r="3" opacity="0.3"/>
    <circle cx="215" cy="88" r="2" opacity="0.3"/>
    <circle cx="210" cy="100" r="2.5" opacity="0.3"/>
    <line x1="203" y1="89" x2="214" y2="89" stroke="#06B6D4" stroke-width="0.8" opacity="0.3"/>

    <!-- Parchemin déroulé -->
    <path d="M290,50 q30,-10 50,0 l-5,110 q-20,8 -45,0z" opacity="0.7"/>
    <ellipse cx="290" cy="50" rx="5" ry="12" opacity="0.9"/>
    <ellipse cx="335" cy="160" rx="5" ry="8" opacity="0.8"/>
    <!-- Lignes de texte sur parchemin -->
    <line x1="298" y1="70" x2="328" y2="66" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>
    <line x1="298" y1="82" x2="325" y2="78" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>
    <line x1="297" y1="94" x2="330" y2="90" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>
    <line x1="297" y1="106" x2="320" y2="103" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>
    <line x1="296" y1="118" x2="328" y2="115" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>
    <line x1="296" y1="130" x2="322" y2="127" stroke="#06B6D4" stroke-width="1.2" opacity="0.35"/>

    <!-- Petits livres empilés -->
    <rect x="155" y="150" width="40" height="8" rx="1" transform="rotate(-5,175,154)" opacity="0.5"/>
    <rect x="152" y="140" width="45" height="8" rx="1" transform="rotate(3,175,144)" opacity="0.6"/>
    <rect x="150" y="130" width="42" height="8" rx="1" transform="rotate(-2,171,134)" opacity="0.5"/>
  </g>
</svg>
