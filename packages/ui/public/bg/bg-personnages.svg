<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Personnages: groupe de silhouettes d'aventuriers -->
  <g fill="#3B82F6">
    <!-- Personnage 1 - guerrier avec épée -->
    <path d="M60,195 v-70 l-8,-15 l8,-10 l8,10 l-8,15 v70z"/>
    <circle cx="60" cy="90" r="10"/>
    <path d="M48,130 l-12,30 M72,130 l12,30"/>
    <path d="M48,195 l-5,-40 h-3 l8,40z M72,195 l5,-40 h3 l-8,40z"/>
    <rect x="38" y="100" width="4" height="50" rx="1" transform="rotate(-15,40,125)"/>

    <!-- Personnage 2 - archer -->
    <path d="M110,195 v-65 l-7,-12 l7,-8 l7,8 l-7,12 v65z"/>
    <circle cx="110" cy="100" r="9"/>
    <path d="M99,135 l-10,28 M121,135 l10,28"/>
    <path d="M99,195 l-4,-35 h-3 l7,35z M121,195 l4,-35 h3 l-7,35z"/>
    <path d="M125,105 q15,-30 0,-60" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <line x1="125" y1="75" x2="135" y2="75" stroke="#3B82F6" stroke-width="1.5"/>

    <!-- Personnage 3 - mage central (plus grand) -->
    <path d="M170,195 v-75 l-10,-15 l10,-12 l10,12 l-10,15 v75z"/>
    <circle cx="170" cy="82" r="11"/>
    <path d="M155,125 l-14,35 M185,125 l14,35"/>
    <path d="M157,195 l-5,-42 h-4 l9,42z M183,195 l5,-42 h4 l-9,42z"/>
    <!-- Chapeau pointu de mage -->
    <path d="M159,82 l11,-30 l11,30z" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <!-- Bâton -->
    <rect x="148" y="90" width="3" height="65" rx="1"/>
    <circle cx="149" cy="88" r="5" fill="none" stroke="#3B82F6" stroke-width="2"/>

    <!-- Personnage 4 - voleur -->
    <path d="M230,195 v-60 l-6,-12 l6,-8 l6,8 l-6,12 v60z"/>
    <circle cx="230" cy="105" r="8"/>
    <path d="M221,140 l-8,25 M239,140 l8,25"/>
    <path d="M221,195 l-3,-32 h-3 l6,32z M239,195 l3,-32 h3 l-6,32z"/>
    <path d="M222,120 l-10,-5 M238,120 l10,-5"/>

    <!-- Personnage 5 - paladin avec bouclier -->
    <path d="M285,195 v-68 l-8,-14 l8,-10 l8,10 l-8,14 v68z"/>
    <circle cx="285" cy="93" r="10"/>
    <path d="M273,132 l-11,30 M297,132 l11,30"/>
    <path d="M273,195 l-4,-38 h-3 l7,38z M297,195 l4,-38 h3 l-7,38z"/>
    <!-- Bouclier -->
    <path d="M300,115 l12,0 l0,18 l-12,10z" fill="none" stroke="#3B82F6" stroke-width="2.5"/>

    <!-- Personnage 6 -->
    <path d="M340,195 v-58 l-6,-11 l6,-8 l6,8 l-6,11 v58z"/>
    <circle cx="340" cy="108" r="8"/>
    <path d="M332,143 l-8,22 M348,143 l8,22"/>
    <path d="M332,195 l-3,-30 h-2 l5,30z M348,195 l3,-30 h2 l-5,30z"/>
  </g>
</svg>
