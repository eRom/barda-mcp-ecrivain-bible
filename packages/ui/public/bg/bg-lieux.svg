<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Lieux: ville/château isométrique avec montagnes -->
  <g fill="#10B981" fill-opacity="1">
    <!-- Montagnes arrière-plan -->
    <path d="M0,140 l40,-60 l30,40 l20,-30 l35,50z" opacity="0.4"/>
    <path d="M100,140 l50,-80 l40,55 l30,-25 l50,50z" opacity="0.35"/>
    <path d="M250,140 l40,-50 l30,30 l25,-20 l55,40z" opacity="0.3"/>

    <!-- Sol isométrique -->
    <path d="M80,160 l120,-40 l120,40 l-120,35z" opacity="0.15"/>

    <!-- Tour gauche -->
    <rect x="130" y="90" width="25" height="70" rx="2"/>
    <path d="M127,90 l15,-18 l15,18z"/>
    <rect x="138" y="100" width="8" height="12" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <rect x="138" y="120" width="8" height="12" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <!-- Crénelures -->
    <rect x="128" y="86" width="5" height="6"/>
    <rect x="137" y="86" width="5" height="6"/>
    <rect x="146" y="86" width="5" height="6"/>

    <!-- Bâtiment central -->
    <rect x="165" y="100" width="55" height="60" rx="2"/>
    <path d="M160,100 l32,-25 l32,25z"/>
    <!-- Porte -->
    <path d="M185,160 v-28 a10,10 0 0 1 20,0 v28z" fill="none" stroke="#10B981" stroke-width="2"/>
    <!-- Fenêtres -->
    <rect x="170" y="110" width="8" height="10" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <rect x="207" y="110" width="8" height="10" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="192" cy="85" r="5" fill="none" stroke="#10B981" stroke-width="1.5"/>

    <!-- Tour droite -->
    <rect x="230" y="95" width="22" height="65" rx="2"/>
    <path d="M228,95 l13,-15 l13,15z"/>
    <rect x="236" y="105" width="7" height="10" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <rect x="236" y="125" width="7" height="10" rx="1" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <rect x="228" y="91" width="5" height="5"/>
    <rect x="237" y="91" width="5" height="5"/>
    <rect x="246" y="91" width="5" height="5"/>

    <!-- Arbres -->
    <circle cx="90" cy="140" r="12" opacity="0.5"/>
    <rect x="88" y="140" width="4" height="15"/>
    <circle cx="300" cy="135" r="10" opacity="0.5"/>
    <rect x="298" y="135" width="4" height="15"/>
    <circle cx="330" cy="145" r="8" opacity="0.4"/>
    <rect x="328" y="145" width="4" height="12"/>

    <!-- Chemin -->
    <path d="M195,160 q10,15 30,20 q20,5 60,5" fill="none" stroke="#10B981" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
