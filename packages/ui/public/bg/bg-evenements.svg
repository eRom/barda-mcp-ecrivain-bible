<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Evenements: timeline sinueuse avec marqueurs et sablier -->
  <g fill="#F59E0B">
    <!-- Ligne de timeline sinueuse -->
    <path d="M20,100 C70,40 130,160 200,100 S330,40 380,100" fill="none" stroke="#F59E0B" stroke-width="3" opacity="0.6"/>

    <!-- Marqueurs sur la timeline -->
    <!-- Point 1 -->
    <circle cx="65" cy="68" r="12"/>
    <circle cx="65" cy="68" r="7" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <line x1="65" y1="80" x2="65" y2="95" stroke="#F59E0B" stroke-width="2"/>

    <!-- Point 2 -->
    <circle cx="140" cy="132" r="10"/>
    <circle cx="140" cy="132" r="6" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <line x1="140" y1="122" x2="140" y2="108" stroke="#F59E0B" stroke-width="2"/>

    <!-- Point 3 (central, plus grand) -->
    <circle cx="200" cy="100" r="14"/>
    <circle cx="200" cy="100" r="9" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <path d="M195,97 l5,-5 l5,5z M195,103 l5,5 l5,-5z"/>

    <!-- Point 4 -->
    <circle cx="268" cy="72" r="10"/>
    <circle cx="268" cy="72" r="6" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <line x1="268" y1="82" x2="268" y2="96" stroke="#F59E0B" stroke-width="2"/>

    <!-- Point 5 -->
    <circle cx="345" cy="95" r="11"/>
    <circle cx="345" cy="95" r="7" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>

    <!-- Sablier décoratif -->
    <path d="M190,145 h20 l-10,18z" opacity="0.5"/>
    <path d="M190,185 h20 l-10,-18z" opacity="0.5"/>
    <rect x="188" y="143" width="24" height="3" rx="1" opacity="0.5"/>
    <rect x="188" y="184" width="24" height="3" rx="1" opacity="0.5"/>

    <!-- Étoiles décoratives -->
    <circle cx="100" cy="45" r="2" opacity="0.4"/>
    <circle cx="310" cy="55" r="2.5" opacity="0.4"/>
    <circle cx="250" cy="150" r="2" opacity="0.3"/>
    <circle cx="50" cy="155" r="1.5" opacity="0.3"/>
    <circle cx="350" cy="145" r="2" opacity="0.35"/>
  </g>
</svg>
